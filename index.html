<style>

","items":[{"title":"OpenAI GPT-5.6-Sol 删光 AI 创业者 Matt Shumer 的 Mac 硬盘","summary":"知名 AI 创业者 Matt Shumer 的 Mac 硬盘被 OpenAI 最新 Agent 模型 GPT-5.6-Sol 彻底清空。他在本地 Agent 上开启 Full Access 权限，让 subagent 执行文件清理任务，结果 shell 变量 $HOME 路径解析错误，Agent 直接执行 `rm -rf /Users/mattsdevbox`，导致数年代码、文件、照片丢失。该任务此前已安全运行数百次。事后 Agent 自动生成事故报告承认错误。Matt 表示“1000x 更信任 Anthropic 的 Fable”。事件暴露 Agent 行业核心风险：顶级模型仍会在变量展开、路径等细节翻车；Subagent + 长…","source":"X：阿易 AI Notes (@AYi_AInotes)","url":"https://x.com/AYi_AInotes/status/2075761215251312722","permalink":"https://aihot.virxact.com/items/cmrfr2xvi02brihjlp1tlzg1n","publishedAt":"2026-07-11T01:56:54.000Z"},{"title":"研究：博科圣地已使用ChatGPT、Claude等主流AI聊天机器人用于袭击策划与武器开发","summary":"剑桥大学CASP研究员Antonia Jülich对27名前成员的57次访谈显示，博科圣地已使用ChatGPT、Claude、Gemini、Grok、Meta AI和DeepSeek等主流AI聊天机器人，用于袭击策划、制造更强爆炸装置、武器维护及行动安全。该组织两个派系均设立了专门的AI部门。ISIS自2023年起便提供提示工程和越狱培训，并训练尼日利亚的博科圣地指挥官绕过AI安全过滤器。研究指出，安全过滤器未能可靠防止滥用。Anthropic近期承认，越狱可能永远无法完全消除。","source":"The Decoder：AI News（RSS）","url":"https://the-decoder.com/terrorist-groups-are-using-every-major-ai-chatbot-for-attack-planning-and-weapons-development","permalink":"https://aihot.virxact.com/items/cmrgmylg702eaih2e1e9hhfe4","publishedAt":"2026-07-11T17:04:28.000Z"},{"title":"11天Claude Fable 5写超100万行代码：Rust重构JavaScript运行时Bun","summary":"开发者Jarred Sumner借助Claude Fable 5模型，11天内将Bun从Zig重写为Rust，64个实例并行编写超100万行代码，API费用约16.5万美元。重构主因是Zig频繁内存错误，Rust可在编译时捕获。Bun v1.4.0以Canary版本发布，修复128个错误，速度提高约2%到5%。Bun团队已于2025年12月被Anthropic收购。","source":"IT之家（RSS）","url":"https://www.ithome.com/0/975/469.htm","permalink":"https://aihot.virxact.com/items/cmrg3syhp00l7iha7a3ansg62","publishedAt":"2026-07-11T07:33:08.000Z"},{"title":"彭博社揭秘苹果起诉 OpenAI 内幕：前员工一句“哈哈”成窃密关键","summary":"苹果起诉 OpenAI，指控前工程师 Chang Liu 离职时带走未归还的 MacBook、一名可分享内情的员工，并利用软件漏洞持续访问苹果内网。他发现漏洞后向同事分享“哈哈，我发现我还能访问网络存储”，后者协助其获取更多机密。苹果称 OpenAI 试图复制 iPhone 产品研发体系，核心从非法窃取的商业机密腐烂。目前已有超 400 名苹果员工跳槽至 OpenAI，包括前苹果高管、现任 OpenAI 首席硬件官 Tang Tan。苹果曾于今年 2 月尝试私了，但 OpenAI 未回应。","source":"IT之家（RSS）","url":"https://www.ithome.com/0/975/634.htm","permalink":"https://aihot.virxact.com/items/cmrgzykqg00jabid4acp6zpjm","publishedAt":"2026-07-11T23:21:57.000Z"}]},{"key":"paper","label":"论文研究","items":[]},{"key":"tip","label":"技巧与观点","items":[{"title":"Ghost Font：一种人类能读懂但AI无法识别的反AI字体","summary":"Ghost Font 是一种利用运动、视频、噪点和诱饵来隐藏文字的反AI字体。用户输入文字后可生成并下载视频片段，视频中的字母由与背景完全相同的点组成，单帧截图无法显示任何信息。该字体生成的视频被传递给Claude Fable和GPT Sol 5.6 Ultra等前沿模型时，这些模型即使具备编程能力也无法解码移动信息，直到被提示具体技术。视频中还包含一条诱饵信息，使模型误以为找到真实内容。项目灵感来自2013年Sang Mun设计的ZXX字体，但现代AI已能轻松读取ZXX。Ghost Font目前为本地原型，数据不发送至任何服务器。作者计划未来将视频生成代码开源，并探索将其用于CAPTCHA系统或AI视觉感知基准测试。","source":"Hacker News 热门（buzzing.cc 中文翻译）","url":"https://www.mixfont.com/ghost-font","permalink":"https://aihot.virxact.com/items/cmrglsyla01zoih2enmsl2eu8","publishedAt":"2026-07-11T16:31:09.615Z"}]}]};

/* ---------- helpers ---------- */
function beijingParts(iso){
  const d = new Date(iso);
  const bt = new Date(d.getTime() + 8*3600*1000);
  return {y:bt.getUTCFullYear(), mo:bt.getUTCMonth()+1, da:bt.getUTCDate(),
          hh:bt.getUTCHours(), mm:bt.getUTCMinutes()};
}
function fmtTime(iso, issueDate){
  if(!iso) return "";
  const p = beijingParts(iso);
  const hh = String(p.hh).padStart(2,'0');
  const mm = String(p.mm).padStart(2,'0');
  const [iy,im,id] = issueDate.split('-').map(Number);
  const diff = Math.round((Date.UTC(iy,im-1,id) - Date.UTC(p.y,p.mo-1,p.da))/86400000);
  if(diff === 0) return "今天 " + hh + ":" + mm;
  if(diff === 1) return "昨天 " + hh + ":" + mm;
  return p.mo + "月" + p.da + "日 " + hh + ":" + mm;
}
function weekday(dateStr){
  const [y,m,d] = dateStr.split('-').map(Number);
  const w = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"][new Date(y,m-1,d).getDay()];
  return y + "年" + m + "月" + d + "日 " + w;
}
function truncate(s, n){ return (!s || s.length <= n) ? (s||"") : s.slice(0,n) + "…"; }
function esc(s){
  return String(s == null ? "" : s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('show'), 2600);
}

/* ---------- 持久化设置 ---------- */
function onAutoChange(){
  const min = parseInt(document.getElementById('autoSel').value, 10);
  localStorage.setItem("aihot_auto", String(min));
  applyAuto(min);
  toast(min > 0 ? ("已开启自动刷新：每 " + min + " 分钟") : "已关闭自动刷新");
}
function onProxyChange(){
  proxyURL = (document.getElementById('proxyInput').value || "").trim();
  localStorage.setItem("aihot_proxy", proxyURL);
}
function applyAuto(min){
  if(autoTimer){ clearInterval(autoTimer); autoTimer = null; }
  if(min > 0) autoTimer = setInterval(() => refresh(true), min * 60000);
}
/* ---------- 数据来源解析（三级择路） ----------
   优先级：① 同源代理（本地 aihot-proxy-server.mjs 注入 window.__AIHOT_PROXY__）
           ② 用户自定义 CORS 代理（上方输入框）
           ③ 内置公共代理链（自动，连 file:// 也能用，无需后端）            */
const PROXY_CHAIN = [
  {name:"allorigins",   base:"https://api.allorigins.win/raw?url="},
  {name:"cors-bridged", base:"https://cors.bridged.cc/"},
  {name:"yacdn",        base:"https://yacdn.org/proxy/"},
  {name:"cf-workers",   base:"https://test.cors.workers.dev/?"},
];
function resolveDirect(path){
  if(window.__AIHOT_PROXY__) return window.__AIHOT_PROXY__ + path;        // 同源
  if(proxyURL) return proxyURL + encodeURIComponent(API + path);          // 用户代理
  return null;                                                           // 走内置链
}
function chainURL(p, path){ return p.base + encodeURIComponent(API + path); }
async function getJSON(url, timeoutMs){
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), timeoutMs || 15000);
  try{
    const r = await fetch(url, {signal:ctrl.signal, headers:{"User-Agent":navigator.userAgent}});
    if(!r.ok) throw new Error("HTTP " + r.status);
    return await r.json();
  } finally { clearTimeout(t); }
}
/* 统一取数：自动在「同源 / 用户代理 / 内置链」间择路；内置链逐代理带超时重试 */
async function fetchData(path){
  const direct = resolveDirect(path);
  if(direct) return await getJSON(direct);
  let lastErr;
  for(const p of PROXY_CHAIN){
    try{
      const data = await getJSON(chainURL(p, path), 15000);
      if(data && typeof data === "object") return data;
    }catch(e){ lastErr = e; }
  }
  throw new Error(lastErr ? lastErr.message : "所有公共代理均不可用");
}

/* ---------- normalize ---------- */
function normalize(daily, pmap){
  const map = {};
  (daily.sections||[]).forEach(s => { map[s.label] = s.items||[]; });
  const sections = SECTIONS.map(sec => ({
    key: sec.key, label: sec.label,
    items: (map[sec.label]||[]).map(it => ({
      title: it.title || "",
      summary: (it.summary || "").trim(),
      source: it.sourceName || it.source || "AI HOT",
      url: it.sourceUrl || it.url || it.permalink || "#",
      permalink: it.permalink || "",
      publishedAt: (pmap && it.permalink && pmap[it.permalink]) ? pmap[it.permalink] : (it.publishedAt || null)
    }))
  }));
  return {
    issue: {
      date: daily.date,
      source: (daily.attribution && daily.attribution.source) || "AI HOT",
      canonical: (daily.attribution && daily.attribution.canonical) || "",
      generatedAt: daily.generatedAt || null
    },
    sections
  };
}

/* ---------- render（保留滚动/已读状态） ---------- */
function render(){
  const sy = window.scrollY;
  const aeId = (document.activeElement && document.activeElement.id) ? document.activeElement.id : null;

  const issue = DATA.issue;
  const total = DATA.sections.reduce((a,s)=>a+s.items.length, 0);

  document.getElementById('heroDate').textContent = weekday(issue.date);
  document.getElementById('heroSub').textContent =
    "每日 AI 行业精选 · 共 " + total + " 条 · 数据日期 " + issue.date;

  document.getElementById('heroStats').innerHTML = DATA.sections.map(s =>
    '<div class="stat"><div class="n">'+s.items.length+'</div><div class="l">'+esc(s.label)+'</div></div>'
  ).join('');

  document.getElementById('nav').innerHTML = SECTIONS.map(sec => {
    const s = DATA.sections.find(x=>x.key===sec.key);
    const c = s ? s.items.length : 0;
    return '<a href="#sec-'+sec.key+'"><span class="sw" style="background:'+sec.accent+'"></span>'
      + esc(sec.label) + '<span class="cnt">'+c+'</span></a>';
  }).join('');

  let html = "", g = 0;
  SECTIONS.forEach(sec => {
    const s = DATA.sections.find(x=>x.key===sec.key) || {items:[]};
    const accent = sec.accent;
    html += '<section class="section" id="sec-'+sec.key+'" style="--accent:'+accent+'">';
    html += '<div class="sec-head"><span class="bar"></span><h2>'+esc(sec.label)
      + '</h2><span class="badge">'+s.items.length+' 条</span></div>';
    if(s.items.length === 0){
      html += '<div class="grid"><div class="empty">本期暂无相关条目</div></div>';
    } else {
      html += '<div class="grid">';
      s.items.forEach(it => {
        g++;
        const num = String(g).padStart(2,'0');
        const t = fmtTime(it.publishedAt, issue.date);
        const timeHtml = t ? '<span class="time">'+esc(t)+'</span>' : '<span class="time"></span>';
        const url = it.url && it.url !== "#" ? it.url : it.permalink;
        const safeUrl = esc(url);
        const aAttrs = 'href="'+safeUrl+'" target="_blank" rel="noopener noreferrer"';
        const isRead = readSet.has(it.permalink);
        html += '<article class="card'+(isRead?' read':'')+'">'
          + '<div class="card-top"><span class="idx">'+num+'</span>'
          + '<span class="right"><button class="mark" data-pid="'+esc(it.permalink)+'" onclick="toggleRead(this)">'
          + (isRead?'已读 ✓':'标记已读') + '</button>'+timeHtml+'</span></div>'
          + '<h3 class="card-title"><a '+aAttrs+'>'+esc(it.title)+'</a></h3>'
          + '<span class="chip" title="'+esc(it.source)+'">'+esc(it.source)+'</span>'
          + '<p class="sum" title="'+esc(it.summary)+'">'+esc(truncate(it.summary,60))+'</p>'
          + '<a class="link" '+aAttrs+'>阅读原文 →</a></article>';
      });
      html += '</div>';
    }
    html += '</section>';
  });
  document.getElementById('content').innerHTML = html;

  const src = issue.canonical
    ? '<a href="'+esc(issue.canonical)+'" target="_blank" rel="noopener noreferrer">'+esc(issue.source)+'</a>'
    : esc(issue.source);
  document.getElementById('foot').innerHTML =
    "共 <strong>"+total+"</strong> 条 · 数据来源 " + src + "（aihot.virxact.com）";

  // (6) 还原用户状态：滚动位置 + 焦点
  window.scrollTo(0, sy);
  if(aeId){ const el = document.getElementById(aeId); if(el) el.focus({preventScroll:true}); }
}

function toggleRead(btn){
  const pid = btn.dataset.pid;
  if(readSet.has(pid)) readSet.delete(pid); else readSet.add(pid);
  try { localStorage.setItem("aihot_read", JSON.stringify([...readSet])); } catch(e){}
  const card = btn.closest('.card');
  const on = readSet.has(pid);
  card.classList.toggle('read', on);
  btn.textContent = on ? '已读 ✓' : '标记已读';
}

/* ---------- 加载状态 / 错误 ---------- */
function setLoading(on){
  document.getElementById('progress').classList.toggle('active', on);
  const b = document.getElementById('refreshBtn');
  b.disabled = on; b.textContent = on ? '↻ 获取中…' : '↻ 刷新数据';
}
function showError(msg){ document.getElementById('errMsg').textContent = msg; document.getElementById('errbar').classList.add('show'); }
function hideError(){ document.getElementById('errbar').classList.remove('show'); }

/* ---------- 实时拉取（自动择路 + 代理链兜底） ---------- */
async function loadLive(){
  let daily = await fetchData("/daily");
  if(!daily || !daily.sections || daily.sections.length === 0){
    const dl = await fetchData("/dailies?take=5");
    const items = (dl && dl.items) || [];
    if(items.length) daily = await fetchData("/daily/" + items[0].date);
  }
  if(!daily) return null;
  const ws = daily.windowStart || "2026-07-10T00:00:00.000Z";
  let pmap = {};
  try{
    let cursor = null, pages = 0;
    while(pages < 8){
      let u = "/items?mode=all&since=" + ws + "&take=100";
      if(cursor) u += "&cursor=" + encodeURIComponent(cursor);
      const d = await fetchData(u);
      (d.items||[]).forEach(it => { pmap[it.permalink] = it.publishedAt; });
      if(!d.hasNext) break;
      cursor = d.nextCursor; if(!cursor) break; pages++;
    }
  }catch(e){ /* 时间戳可选，失败不影响条目展示 */ }
  return normalize(daily, pmap);
}

/* ---------- 刷新主流程（含防重 + 状态保留） ---------- */
async function refresh(isAuto){
  if(refreshing) return;            // (5) 刷新中不再发起
  refreshing = true;
  setLoading(true);
  hideError();
  try{
    const live = await loadLive();
    if(live && live.sections.some(s=>s.items.length)){
      DATA = live; MODE = "live"; render();
      const now = new Date();
      const hh = String(now.getHours()).padStart(2,'0'), mm = String(now.getMinutes()).padStart(2,'0');
      document.getElementById('status').textContent = "● 实时数据 · 拉取于 " + hh + ":" + mm;
      hideError();
      toast("已更新为实时数据");
    } else {
      showError("未获取到新数据，已保留当前内容。");
    }
  }catch(e){
    showError("实时获取失败：" + (e && e.message ? e.message : e) + "。公共代理可能临时限流，可稍后点重试；或在本地运行同目录 aihot-proxy-server.mjs 获得更稳定的同源连接。（已保留当前内容）");
    if(!isAuto) toast("实时获取失败，已使用内置快照");
  }finally{
    refreshing = false;
    setLoading(false);
  }
}

/* ---------- boot ---------- */
DATA = EMBEDDED;
document.getElementById('status').textContent = "● 内置数据快照 · 生成于 "
  + EMBEDDED.fetchedAt.replace("T"," ").slice(0,16) + "（AI HOT 日报）";
if(location.protocol === 'file:' && !proxyURL && !window.__AIHOT_PROXY__){
  toast("本地面板将通过公共代理获取实时数据；运行同目录 aihot-proxy-server.mjs 可获得更稳定的同源连接");
}
const savedAuto = parseInt(localStorage.getItem("aihot_auto") || "0", 10);
document.getElementById('autoSel').value = String(savedAuto);
proxyURL = localStorage.getItem("aihot_proxy") || "";
document.getElementById('proxyInput').value = proxyURL;
applyAuto(savedAuto);
render();
</script>
