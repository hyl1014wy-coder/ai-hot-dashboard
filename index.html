  {name:"allorigins",   base:"https://api.allorigins.win/raw?url="},
  {name:"cors-bridged", base:"https://cors.bridged.cc/"},
  {name:"yacdn",        base:"https://yacdn.org/proxy/"},
  {name:"cf-workers",   base:"https://test.cors.workers.dev/?"},
];
function resolveDirect(path){
  if(window.__AIHOT_PROXY__) return window.__AIHOT_PROXY__ + path;        // هگŒو؛گ
  if(proxyURL) return proxyURL + encodeURIComponent(API + path);          // ç”¨وˆ·ن»£çگ†
  return null;                                                           // èµ°ه†…ç½®é“¾
}
function chainURL(p, path){ return p.base + encodeURIComponent(API + path); }
async function getJSON(url, timeoutMs){
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), timeoutMs || 15000);
  try{
    const r = await fetch(url, {signal:ctrl.signal, headers:{"User-Agent":navigator.userAgent}});
    if(!r.ok) throw new Error("HTTP " + r.status);
    return await r.json();
  } finally { clearTimeout(t); }
}
/* ç»ںن¸€هڈ–و•°ï¼ڑè‡ھهٹ¨هœ¨م€ŒهگŒو؛گ / ç”¨وˆ·ن»£çگ† / ه†…ç½®é“¾م€چé—´و‹©è·¯ï¼›ه†…ç½®é“¾é€گن»£çگ†ه¸¦è¶…و—¶é‡چè¯• */
async function fetchData(path){
  const direct = resolveDirect(path);
  if(direct) return await getJSON(direct);
  let lastErr;
  for(const p of PROXY_CHAIN){
    try{
      const data = await getJSON(chainURL(p, path), 20000);
      if(data && typeof data === "object") return data;
    }catch(e){ lastErr = e; }
  }
  throw new Error(lastErr ? lastErr.message : "و‰€وœ‰ه…¬ه…±ن»£çگ†ه‌‡ن¸چهڈ¯ç”¨");
}

/* è¯»هڈ– GitHub Actions وڈگن؛¤çڑ„هگŒو؛گه؟«ç…§ï¼ˆو—  CORSم€پوœ€ç¨³ï¼‰ */
async function loadSnapshot(){
  try{
    const ctrl = new AbortController();
    const t = setTimeout(() => ctrl.abort(), 10000);
    const r = await fetch("data/latest.json", {signal: ctrl.signal, headers:{"Accept":"application/json"}});
    clearTimeout(t);
    if(!r.ok) return null;
    const d = await r.json();
    if(d && d.sections && d.sections.length) return d;
  }catch(e){}
  return null;
}

/* ---------- normalize ---------- */
function normalize(daily, pmap){
  const map = {};
  (daily.sections||[]).forEach(s => { map[s.label] = s.items||[]; });
  const sections = SECTIONS.map(sec => ({
    key: sec.key, label: sec.label,
    items: (map[sec.label]||[]).map(it => ({
      title: it.title || "",
      summary: (it.summary || "").trim(),
      source: it.sourceName || it.source || "AI HOT",
      url: it.sourceUrl || it.url || it.permalink || "#",
      permalink: it.permalink || "",
      publishedAt: (pmap && it.permalink && pmap[it.permalink]) ? pmap[it.permalink] : (it.publishedAt || null)
    }))
  }));
  return {
    issue: {
      date: daily.date,
      source: (daily.attribution && daily.attribution.source) || "AI HOT",
      canonical: (daily.attribution && daily.attribution.canonical) || "",
      generatedAt: daily.generatedAt || null
    },
    sections
  };
}

function toggleRead(btn){
  const pid = btn.dataset.pid;
  if(readSet.has(pid)) readSet.delete(pid); else readSet.add(pid);
  try { localStorage.setItem("aihot_read", JSON.stringify([...readSet])); } catch(e){}
  const card = btn.closest('.card');
  const on = readSet.has(pid);
  card.classList.toggle('read', on);
  btn.textContent = on ? 'ه·²è¯» âœ“' : 'و ‡è®°ه·²è¯»';
}

/* ---------- هٹ è½½çٹ¶و€پ / é”™è¯¯ ---------- */
function setLoading(on){
  document.getElementById('progress').classList.toggle('active', on);
  const b = document.getElementById('refreshBtn');
  b.disabled = on; b.textContent = on ? 'â†» èژ·هڈ–ن¸­â€¦' : 'â†» هˆ·و–°و•°وچ®';
}
function showError(msg){ document.getElementById('errMsg').textContent = msg; document.getElementById('errbar').classList.add('show'); }
function hideError(){ document.getElementById('errbar').classList.remove('show'); }

/* ---------- ه®‍و—¶و‹‰هڈ–ï¼ˆه…ˆè¯»هگŒو؛گه؟«ç…§ï¼Œه†چèµ°ن»£çگ†é“¾ï¼Œوœ€هگژه›‍é€€ï¼‰ ---------- */
async function loadLive(){
  // 1. هگŒو؛گه؟«ç…§ï¼ˆGitHub Actions ه®ڑو—¶وڈگن؛¤ï¼Œو—  CORSï¼Œوœ€ç¨³ï¼‰
  let daily = await loadSnapshot();
  let source = "snapshot";

  // 2. è‹¥و— ه؟«ç…§ï¼Œèµ°ه®‍و—¶ه…¬ه…±ن»£çگ†é“¾
  if(!daily){
    daily = await fetchData("/daily");
    source = "live";
    if(!daily || !daily.sections || daily.sections.length === 0){
      const dl = await fetchData("/dailies?take=5");
      const items = (dl && dl.items) || [];
      if(items.length) daily = await fetchData("/daily/" + items[0].date);
    }
  }
  if(!daily) return null;

  // 3. è،¥ه……و—¶é—´وˆ³ï¼ˆه؟«ç…§ه·²ه¸¦ publishedAtï¼Œن¼ڑè·³è؟‡ï¼‰
  const ws = daily.windowStart || "2026-07-10T00:00:00.000Z";
  let pmap = {};
  try{
    let cursor = null, pages = 0;
    while(pages < 8){
      let u = "/items?mode=all&since=" + ws + "&take=100";
      if(cursor) u += "&cursor=" + encodeURIComponent(cursor);
      const d = await fetchData(u);
      (d.items||[]).forEach(it => { pmap[it.permalink] = it.publishedAt; });
      if(!d.hasNext) break;
      cursor = d.nextCursor; if(!cursor) break; pages++;
    }
  }catch(e){ /* و—¶é—´وˆ³هڈ¯é€‰ï¼Œه¤±è´¥ن¸چه½±ه“چو‌،ç›®ه±•ç¤؛ */ }
  const result = normalize(daily, pmap);
  result.source = source;
  result.fetchedAt = daily.fetchedAt || new Date().toISOString();
  return result;
}

/* ---------- هˆ·و–°ن¸»وµپç¨‹ï¼ˆهگ«éک²é‡چ + çٹ¶و€پن؟‌ç•™ï¼‰ ---------- */
async function refresh(isAuto){
  if(refreshing) return;            // (5) هˆ·و–°ن¸­ن¸چه†چهڈ‘èµ·
  refreshing = true;
  setLoading(true);
  hideError();
  try{
    const live = await loadLive();
    if(live && live.sections.some(s=>s.items.length)){
      DATA = live; MODE = live.source || "live"; render();
      const beijing = new Date(live.fetchedAt).toLocaleString("zh-CN", {timeZone:"Asia/Shanghai", hour12:false}).replace(/\//g,'-');
      if(MODE === "snapshot"){
        document.getElementById('status').textContent = "â—ڈ ه·²هگŒو­¥و•°وچ® آ· GitHub Actions و›´و–°ن؛ژ " + beijing;
        toast("ه·²هگŒو­¥ن¸؛ن»“ه؛“وœ€و–°و•°وچ®");
      } else {
        const hh = String(new Date().getHours()).padStart(2,'0'), mm = String(new Date().getMinutes()).padStart(2,'0');
        document.getElementById('status').textContent = "â—ڈ ه®‍و—¶و•°وچ® آ· و‹‰هڈ–ن؛ژ " + hh + ":" + mm;
        toast("ه·²و›´و–°ن¸؛ه®‍و—¶و•°وچ®");
      }
      hideError();
    } else {
      showError("وœھèژ·هڈ–هˆ°و–°و•°وچ®ï¼Œه·²ن؟‌ç•™ه½“ه‰چه†…ه®¹م€‚");
    }
  }catch(e){
    showError("ه®‍و—¶èژ·هڈ–ه¤±è´¥ï¼ڑ" + (e && e.message ? e.message : e) + "م€‚ه…¬ه…±ن»£çگ†هڈ¯èƒ½ن¸´و—¶é™گوµپï¼Œهڈ¯ç¨چهگژç‚¹é‡چè¯•ï¼›وˆ–و·»هٹ وœ¬ن»“ه؛“çڑ„ GitHub Actions ه·¥ن½œوµپï¼ˆdata/latest.json هگŒو؛گه؟«ç…§ï¼‰èژ·ه¾—ç¨³ه®ڑو›´و–°م€‚ï¼ˆه·²ن؟‌ç•™ه½“ه‰چه†…ه®¹ï¼‰");
    if(!isAuto) toast("ه®‍و—¶èژ·هڈ–ه¤±è´¥ï¼Œه·²ن½؟ç”¨ه†…ç½®ه؟«ç…§");
  }finally{
    refreshing = false;
    setLoading(false);
  }
}

function formatBeijing(iso){
  return new Date(iso).toLocaleString("zh-CN", {timeZone:"Asia/Shanghai", hour12:false}).replace(/\//g,'-');
}
